collection:
  get:
    tags: [sensors]
    summary: List sensors
    operationId: listSensors
    parameters:
      - $ref: ../components/parameters.yaml#/ProjectIdQuery
    responses:
      200:
        description: Paginated sensors
        content:
          application/json:
            schema:
              $ref: ../components/schemas.yaml#/SensorListResponse
  post:
    tags: [sensors]
    summary: Register sensor
    operationId: registerSensor
    parameters:
      - $ref: ../components/parameters.yaml#/IdempotencyKey
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/SensorRegisterRequest
    responses:
      201:
        description: Sensor registered (token included)
        content:
          application/json:
            schema:
              $ref: ../components/schemas.yaml#/SensorTokenResponse
      400:
        description: Validation error
      409:
        description: Idempotency key conflicts with another payload

item:
  get:
    tags: [sensors]
    summary: Get sensor
    operationId: getSensor
    parameters:
      - $ref: ../components/parameters.yaml#/SensorId
      - $ref: ../components/parameters.yaml#/ProjectIdQuery
    responses:
      200:
        description: Sensor with connection_status
        content:
          application/json:
            schema:
              $ref: ../components/schemas.yaml#/Sensor
      404:
        description: Sensor not found

statusSummary:
  get:
    tags: [sensors]
    summary: Get sensor connection status summary for a project
    operationId: getSensorStatusSummary
    parameters:
      - $ref: ../components/parameters.yaml#/ProjectIdQuery
    responses:
      200:
        description: Counts of online/delayed/offline sensors
        content:
          application/json:
            schema:
              type: object
              properties:
                online:
                  type: integer
                delayed:
                  type: integer
                offline:
                  type: integer
                total:
                  type: integer
              required: [online, delayed, offline, total]

rotateToken:
  post:
    tags: [sensors]
    summary: Rotate sensor token
    operationId: rotateSensorToken
    parameters:
      - $ref: ../components/parameters.yaml#/SensorId
    responses:
      200:
        description: Token rotated
        content:
          application/json:
            schema:
              $ref: ../components/schemas.yaml#/SensorTokenResponse

heartbeatHistory:
  get:
    tags: [sensors]
    summary: Get sensor heartbeat history (per-minute buckets for sparkline)
    operationId: getSensorHeartbeatHistory
    parameters:
      - $ref: ../components/parameters.yaml#/SensorId
      - $ref: ../components/parameters.yaml#/ProjectIdQuery
      - name: minutes
        in: query
        schema:
          type: integer
          default: 60
          minimum: 1
          maximum: 1440
    responses:
      200:
        description: List of per-minute bucket timestamps
        content:
          application/json:
            schema:
              type: object
              properties:
                sensor_id:
                  type: string
                  format: uuid
                timestamps:
                  type: array
                  items:
                    type: string
                    format: date-time
                count:
                  type: integer
              required: [sensor_id, timestamps, count]
      404:
        description: Sensor not found

conversionProfiles:
  get:
    tags: [conversion_profiles]
    summary: List conversion profiles
    operationId: listConversionProfiles
    parameters:
      - $ref: ../components/parameters.yaml#/SensorId
      - $ref: ../components/parameters.yaml#/ProjectIdQuery
    responses:
      200:
        description: Paginated conversion profiles
        content:
          application/json:
            schema:
              $ref: ../components/schemas.yaml#/ConversionProfileListResponse
  post:
    tags: [conversion_profiles]
    summary: Create conversion profile
    operationId: createConversionProfile
    parameters:
      - $ref: ../components/parameters.yaml#/SensorId
      - $ref: ../components/parameters.yaml#/ProjectIdQuery
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/ConversionProfileCreate
    responses:
      201:
        description: Conversion profile created
        content:
          application/json:
            schema:
              $ref: ../components/schemas.yaml#/ConversionProfile

conversionProfilePublish:
  post:
    tags: [conversion_profiles]
    summary: Publish conversion profile
    operationId: publishConversionProfile
    parameters:
      - $ref: ../components/parameters.yaml#/SensorId
      - $ref: ../components/parameters.yaml#/ProfileId
      - $ref: ../components/parameters.yaml#/ProjectIdQuery
    responses:
      200:
        description: Conversion profile published
        content:
          application/json:
            schema:
              $ref: ../components/schemas.yaml#/ConversionProfile

